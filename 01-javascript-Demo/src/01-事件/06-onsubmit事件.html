<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		<!--	静态注册onsubmit事件	-->
		function onsubmitFunc() {
			// 要验证所有表单是否合法，如果有一个不合法，就会阻止表单的提交
			alert("onsubmit事件的静态注册 --- 发现不合法，阻止提交");
			return false;
		}

		window.onload = function () {
			//1.获取标签对象
			let element = document.getElementById("form01");
			// 2. 通过 标签对象.属性名= function(){}
			element.onsubmit = function () {
				alert("onsubmit事件的动态注册 --- 发现不合法");
				return true;
			}
		}
	</script>
</head>
<body>
<!--return false可以阻止表单提交-->
<form action="http://localhost:8080" method="get" onsubmit="return onsubmitFunc()">
	<input type="submit" value="静态注册">
</form>
<form action="http://localhost:8080" id="form01">
	<input type="submit" value="静态注册">
</form>
</body>
</html>
