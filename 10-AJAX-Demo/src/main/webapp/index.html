<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script
			crossorigin="anonymous"
			integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
			src="https://code.jquery.com/jquery-4.0.0.js"></script>
	<script>
		$(function () {
			$("button").on("click", function () {
				// 实例化一个xmlHttpRequest对象
				let request = new XMLHttpRequest();

				// 设置发送请求的方式和请求的资源路径
				request.open("GET", "/hello?username=zhangsan");

				// 发送请求
				request.send('a=100&b=200');

				// 设置对象的回调函数
				// request.readyState 1 2 3 4,其中4:代表后端返回了数据
				// request.status：响应状态码
				request.onreadystatechange = function () {
					if (request.readyState === 4 && request.status < 300) {
						// 接受响应的结果，处理结果
						// request.responseText 后端响应回来的响应体中的数据
						// console.log(request.responseText);

						console.log(request.status);                    // 状态码
						console.log(request.statusText);                // 状态字符串
						console.log(request.getAllResponseHeaders());   // 所有响应头
						console.log(request.response);                  // 响应体

						// // 将信息放到指定的位置
						// $("#message").val(request.responseText)
						window.location.href = "https://www.baidu.com"
					}
				}


			})
		})
	</script>
</head>
<body>
<button>按钮</button>
<input id="message" type="text">
</body>
</html>
