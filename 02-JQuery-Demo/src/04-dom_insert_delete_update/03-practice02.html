<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script
			crossorigin="anonymous"
			integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
			src="https://code.jquery.com/jquery-4.0.0.js"></script>
	<script>
		$(function () {
			// 创建一个可以用于删除的func函数
			function deleteEmp(){
				let $trObj = $(this).parent().parent();
				let name = $trObj.find("td:first").text();
				// confirm 是javascript语言提供的一个确认提示框函数，传入什么就提示什么
				// 确定返回true,取消返回false
				let confirmResult = confirm("是否确定删除[" + name + "]吗?");
				if (confirmResult) {
					$trObj.remove();
				}
				return confirmResult;
			}

			// 添加按钮的单击事件
			$("#submitBtn").click(function () {
				let empName = $("#empName").val();
				let empEmail = $("#empEmail").val();
				let empSalary = $("#empSalary").val();
				let $newEmp = $("<tr>" +
					"<td>" + empName + "</td>" +
					"<td>" + empEmail + "</td>" +
					"<td>" + empSalary + "</td>" +
					"<td><a href=\"javascript:;\">Delete</a></td>" +
					"</tr>");

				$newEmp.appendTo($("tbody"));
				let $delete = $newEmp.find("a");
				$delete.click(deleteEmp);
			})

			// 删除
			$("a").click(deleteEmp);
		})

	</script>
	<style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 28px 40px;
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            color: #222222;
            background-color: #ffffff;
        }

        table {
            border-collapse: collapse;
            font-size: 16px;
        }

        th,
        td {
            padding: 6px 10px;
            border: 1px solid #333333;
            text-align: left;
            white-space: nowrap;
        }

        th {
            font-weight: 700;
        }

        td:last-child,
        th:last-child {
            width: 90px;
            text-align: center;
        }

        a {
            color: #2f3ea8;
        }

        .form-box {
            width: 455px;
            margin-top: 85px;
            margin-left: 12px;
            padding: 32px 18px 22px;
            border: 1px solid #333333;
        }

        .form-box h2 {
            margin: 0 0 38px;
            font-size: 24px;
            font-weight: 700;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .form-row label {
            width: 92px;
            text-align: right;
            padding-right: 10px;
        }

        .form-row input {
            width: 328px;
            height: 34px;
            padding: 4px 8px;
            border: 1px solid #999999;
            font-size: 16px;
            outline: none;
        }

        .submit-wrap {
            text-align: center;
            margin-top: 10px;
        }

        .submit-wrap button {
            width: 96px;
            height: 40px;
            border: 1px solid #999999;
            background: linear-gradient(to bottom, #ffffff, #e9e9e9);
            font-size: 16px;
            cursor: pointer;
        }
	</style>
</head>
<body>
<table id="employeeTable">
	<thead>
	<tr>
		<th>Name</th>
		<th>Email</th>
		<th>Salary</th>
		<th></th>
	</tr>
	</thead>
	<tbody>
	<tr>
		<td>Tom</td>
		<td>tom@tom.com</td>
		<td>5000</td>
		<td><a href="javascript:">Delete</a></td>
	</tr>
	<tr>
		<td>Jerry</td>
		<td>jerry@sohu.com</td>
		<td>8000</td>
		<td><a href="javascript:">Delete</a></td>
	</tr>
	<tr>
		<td>Bob</td>
		<td>bob@tom.com</td>
		<td>10000</td>
		<td><a href="javascript:">Delete</a></td>
	</tr>
	</tbody>
</table>

<div class="form-box">
	<h2>添加新员工</h2>
	<div class="form-row">
		<label for="empName">name:</label>
		<input id="empName" type="text">
	</div>
	<div class="form-row">
		<label for="empEmail">email:</label>
		<input id="empEmail" type="text">
	</div>
	<div class="form-row">
		<label for="empSalary">salary:</label>
		<input id="empSalary" type="text">
	</div>
	<div class="submit-wrap">
		<button id="submitBtn" type="button">Submit</button>
	</div>
</div>
</body>
</html>
