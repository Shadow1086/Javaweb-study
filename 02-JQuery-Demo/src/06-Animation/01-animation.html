<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
        div {
            width: 200px;
            height: 200px;
            background-color: skyblue;
            margin-top: 5px;
        }
        button{
            width: 150px;
        }
	</style>
	<script
			crossorigin="anonymous"
			integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
			src="https://code.jquery.com/jquery-4.0.0.js"></script>
	<script>
		$(function () {
			// show()
			$("#btn1").click(function () {
				$("#div1").show(1000, function () {
					alert("show()动画完成")
				});
			})
			// hide()
			$("#btn2").click(function () {
				$("#div1").hide(1000);
			})
			// toggle()
			$("#btn3").click(function () {
				$("#div1").toggle(500);
			})
			// fadeIn()
			$("#btn4").click(function () {
				$("#div1").fadeIn(1000,function (){
					alert("fadeIn()函数完成")
				});
			})
			// fadeOut()
			$("#btn5").click(function () {
				$("#div1").fadeOut();
			})
			$("#btn6").click(function () {
				$("#div1").fadeTo(2000,0.5,function (){
					alert("fadeTo()完成")
				});
			})
			$("#btn7").click(function () {
				$("#div1").fadeToggle(500);
			})
		})
	</script>
</head>
<body>
<button id="btn1">显示show()</button>
<br>
<button id="btn2">隐藏hide()</button>
<br>
<button id="btn3">显示/隐藏切换()</button>
<br>
<button id="btn4">淡入fadeIn()</button>
<br>
<button id="btn5">淡出fadeOut()</button>
<br>
<button id="btn6">淡化到fadeTo()</button>
<br>
<button id="btn7">淡化切换fadeToggle()</button>
<br>

<div id="div1">JQuery动画定义类很多中动画效果，可以很方便的使用这些动画效果</div>
</body>
</html>
