<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>ES6 - 拷贝问题</title>
	<script>
		const person = {
			name: "张三",
			hobbies: ["编码", "跑步"]
		};
		const arr = [1, 2, 3];

		// 浅拷贝
		const arr2 = arr;
		arr2[0] = 100;
		console.log("浅拷贝数组 arr =", arr);
		console.log("浅拷贝数组 arr2 =", arr2);

		// 深拷贝
		const arr3 = [...arr];
		arr3[0] = 100;
		console.log("深拷贝数组 arr3 =", arr3);

		// 对对象也可以通过JSON进行深拷贝
		const shallowPerson = person;
		const person2 = JSON.parse(JSON.stringify(person));
		shallowPerson.name = "李四";
		shallowPerson.hobbies.push("游戏");

		console.log("原对象 person =", person);
		console.log("浅拷贝对象 shallowPerson =", shallowPerson);
		console.log("深拷贝对象 person2 =", person2);
	</script>
</head>
<body>
<h1>ES6 - 深拷贝与浅拷贝</h1>
<p>请打开控制台观察数组和对象引用的变化。</p>
</body>
</html>
