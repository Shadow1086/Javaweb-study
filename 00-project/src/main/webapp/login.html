<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>登录</title>
	<link href="static/css/login.css" rel="stylesheet">
	<script
			crossorigin="anonymous"
			integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
			src="https://code.jquery.com/jquery-4.0.0.js"></script>
	<script>
		$(function () {
			// 检验用户名格式是否合法
			$("#username").on("blur", function () {
				let pattern = /^[0-9A-Za-z]{5,10}$/;
				$("#msg-u-name").text(pattern.test($(this).val()) ? "YES" : "NO")
			})
			// 检验用户密码是否合法
			$("#password").on("blur",function (){
				let pattern = /^(?=.*_)[0-9A-Za-z]{5,10}$/;
				if(!pattern.test($(this).val())){
					$("#msg-u-pwd").text("NO");
				}else {
					$("#msg-u-pwd").text("YES");
				}
			})
		})
	</script>
</head>
<body>
<div class="container">
	<div class="content">
		<div class="welcome">
			<h1>欢迎使用日程管理系统</h1>
			<h2>请登录</h2>
		</div>
		<form action="" class="login-form">
			<div class="submit">
				<label id="u-name">请输入账号：<input id="username" type="text"><span id="msg-u-name"></span></label>
				<label id="u-pwd">请输入密码：<input id="password" type="password"><span id="msg-u-pwd"></span></label>
			</div>
			<div class="btnlist">
				<button>登录</button>
				<button>重置</button>
				<a href="register.html">
					<button>去注册</button>
				</a>
			</div>
		</form>
	</div>
</div>
</body>
</html>
